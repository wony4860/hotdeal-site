<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>핫딜 모음</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="header">
  <div class="header-inner">
    <p class="header-badge">오늘의 핫딜 모음</p>
    <h1>핫딜 모음</h1>
    <p class="header-desc">
      애드픽 추천, 애드픽 핫딜, 쿠팡 추천 상품을 한눈에 모아보세요.
    </p>

    <div class="search-wrap">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="상품명이나 몰 이름으로 검색해보세요"
      />
    </div>
  </div>
</header>
